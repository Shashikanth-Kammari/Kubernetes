apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-config
spec:
  containers:
  - name: nginx
    image: nginx
    env:
    - name: course
      valueFrom:
        configMapKeyRef:
        name: app-config
        key: APP_COLOR
    - name: course
      valueFrom:
        configMapKeyRef:
        name: app-config
        key: APP_MODE